media:
  input: assets
  output: ./assets
  categories:
    - image
  rename: safe

content:
  - name: globalAddons
    label: Adicionais globais
    type: file
    path: data/addons.json
    format: json
    list: true
    fields:
      - name: id
        label: ID interno
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Use apenas letras minusculas, numeros e tracos."
        description: "Identificador unico. Exemplo: ssd-240gb"
      - name: active
        label: Ativo no site
        type: boolean
        default: true
      - name: category
        label: Categoria
        type: select
        required: true
        options:
          values:
            - storage
            - peripherals
      - name: label
        label: Nome do adicional
        type: string
        required: true
        description: "Exemplo: SSD 240GB"
      - name: price
        label: Preco adicional
        type: number
        required: true
        description: "Digite apenas o numero. Exemplo: 150. O site mostra como reais automaticamente."
  - name: products
    label: Anuncios de PCs
    type: file
    path: data/products.json
    format: json
    list: true
    fields:
      - name: id
        label: ID interno
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Use apenas letras minusculas, numeros e tracos."
        description: "Identificador unico. Exemplo: pc-gamer-ryzen-5-3600x"
      - name: active
        label: Ativo no site
        type: boolean
        default: true
      - name: title
        label: Titulo
        type: string
        required: true
      - name: price
        label: Preco
        type: number
        required: true
        description: "Digite apenas o numero. Exemplo: 4000. O site mostra como R$ 4.000,00 automaticamente."
      - name: old
        label: Preco antigo
        type: number
        description: "Opcional. Digite apenas o numero, sem R$."
      - name: badge
        label: Selo do card
        type: string
      - name: image
        label: Foto principal
        type: image
        required: true
      - name: cutout
        label: Foto recortada/PNG do PC
        type: image
        description: "Opcional. Se ficar vazio, o GitHub tenta gerar automaticamente uma versao sem fundo a partir da foto principal."
      - name: photo
        label: Formato da foto
        type: select
        default: square
        options:
          values:
            - square
            - portrait
      - name: tags
        label: Bolhas/tags
        type: string
        list: true
      - name: specs
        label: Especificacoes
        type: object
        fields:
          - name: processor
            label: Processador
            type: string
          - name: memory
            label: Memoria
            type: string
          - name: gpu
            label: Placa de video
            type: string
          - name: powerSupply
            label: Fonte
            type: string
          - name: storage
            label: Armazenamento
            type: string
      - name: links
        label: Links dos anuncios
        type: object
        fields:
          - name: olx
            label: Link da OLX
            type: string
          - name: facebook
            label: Link do Facebook Marketplace
            type: string
      - name: addons
        label: Opcionais especificos deste PC
        type: object
        description: "Use somente quando o opcional for exclusivo deste PC. Os adicionais globais aparecem em todos os PCs automaticamente."
        fields:
          - name: storage
            label: Armazenamento
            type: object
            list: true
            fields:
              - name: active
                label: Ativo
                type: boolean
                default: true
              - name: label
                label: Nome do opcional
                type: string
                required: true
                description: "Exemplo: SSD 240GB instalado"
              - name: price
                label: Preco adicional
                type: number
                required: true
                description: "Digite apenas o numero. Exemplo: 150."
          - name: peripherals
            label: Mouse e teclado / kits perifericos
            type: object
            list: true
            fields:
              - name: active
                label: Ativo
                type: boolean
                default: true
              - name: label
                label: Nome do opcional
                type: string
                required: true
                description: "Exemplo: Kit mouse + teclado"
              - name: price
                label: Preco adicional
                type: number
                required: true
                description: "Digite apenas o numero. Exemplo: 80."
      - name: featured
        label: Destaque interno
        type: boolean
        default: false
