media:
  input: assets
  output: ./assets
  categories:
    - image
  rename: safe

content:
  - name: automationSettings
    label: Automacoes do site
    type: file
    path: data/automation-settings.json
    format: json
    fields:
      - name: postSaleEmailsEnabled
        label: Ativar e-mails de pos-venda
        type: boolean
        default: true
      - name: postSalePollMinutes
        label: Intervalo dos e-mails de pos-venda em minutos
        type: number
        default: 5
        description: "Recomendado: 5 minutos."
      - name: sellerNotificationsEnabled
        label: Enviar e-mail interno quando vender
        type: boolean
        default: true
      - name: sellerEmail
        label: E-mail que recebe avisos internos
        type: string
        default: mobilytechbr@gmail.com
      - name: marketplacePriceSyncEnabled
        label: Ativar verificacao de precos OLX/Facebook
        type: boolean
        default: false
        description: "Comece desligado. Ligue quando a planilha/script estiver configurado."
      - name: marketplacePriceSyncMode
        label: Modo da verificacao de precos
        type: select
        default: review
        options:
          values:
            - review
            - auto
        description: "Review cria sugestoes para conferir. Auto so deve ser usado depois de testes."
      - name: marketplacePriceSyncIntervalMinutes
        label: Intervalo da verificacao de precos em minutos
        type: number
        default: 360
        description: "Recomendado: 360 minutos, ou seja, a cada 6 horas."
      - name: marketplacePriceSyncRequireManualApproval
        label: Exigir aprovacao manual antes de atualizar preco
        type: boolean
        default: true
      - name: marketplacePriceSyncApplyOnlyHighConfidence
        label: Aplicar somente quando a confianca for alta
        type: boolean
        default: true
  - name: globalAddons
    label: Adicionais globais
    type: file
    path: data/addons.json
    format: json
    list: true
    fields:
      - name: id
        label: ID interno
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Use apenas letras minusculas, numeros e tracos."
        description: "Identificador unico. Exemplo: ssd-240gb"
      - name: active
        label: Ativo no site
        type: boolean
        default: true
      - name: category
        label: Categoria
        type: select
        required: true
        options:
          values:
            - storage
            - peripherals
      - name: label
        label: Nome do adicional
        type: string
        required: true
        description: "Exemplo: SSD 240GB"
      - name: price
        label: Preco adicional
        type: number
        required: true
        description: "Digite apenas o numero. Exemplo: 150. O site mostra como reais automaticamente."
      - name: image
        label: Foto do adicional
        type: image
        description: "Opcional. Aparece como miniatura clicavel no site."
      - name: cutout
        label: Foto recortada/PNG do adicional
        type: image
        description: "Opcional. Se ficar vazio e houver foto, o GitHub tenta criar a versao sem fundo automaticamente."
  - name: products
    label: Anuncios de PCs
    type: file
    path: data/products.json
    format: json
    list: true
    fields:
      - name: id
        label: ID interno
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Use apenas letras minusculas, numeros e tracos."
        description: "Identificador unico. Exemplo: pc-gamer-ryzen-5-3600x"
      - name: active
        label: Ativo no site
        type: boolean
        default: true
      - name: title
        label: Titulo
        type: string
        required: true
      - name: price
        label: Preco
        type: number
        required: true
        description: "Digite apenas o numero. Exemplo: 4000. O site mostra como R$ 4.000,00 automaticamente."
      - name: old
        label: Preco antigo
        type: number
        description: "Opcional. Digite apenas o numero, sem R$."
      - name: shipping
        label: Caixa para frete
        type: object
        description: "Opcional. Use para sobrescrever o peso e as medidas padrao da Vercel neste PC."
        fields:
          - name: weightKg
            label: Peso da caixa em kg
            type: number
            description: "Exemplo: 9.5"
          - name: heightCm
            label: Altura da caixa em cm
            type: number
            description: "Exemplo: 55"
          - name: widthCm
            label: Largura da caixa em cm
            type: number
            description: "Exemplo: 35"
          - name: lengthCm
            label: Comprimento da caixa em cm
            type: number
            description: "Exemplo: 60"
          - name: insuranceValue
            label: Valor segurado
            type: number
            description: "Opcional. Se vazio, usa o preco do PC."
      - name: badge
        label: Selo do card
        type: string
      - name: image
        label: Foto principal
        type: image
        required: true
      - name: cutout
        label: Foto recortada/PNG do PC
        type: image
        description: "Opcional. Se ficar vazio, o GitHub tenta gerar automaticamente uma versao sem fundo a partir da foto principal."
      - name: gallery
        label: Fotos extras do PC
        type: object
        list: true
        description: "Opcional. Essas fotos aparecem somente quando o cliente clica na foto do PC para abrir o zoom/galeria."
        fields:
          - name: image
            label: Foto
            type: image
            required: true
          - name: cutout
            label: Foto recortada/PNG
            type: image
            description: "Opcional. Se ficar vazio, o GitHub tenta gerar a versao sem fundo automaticamente."
      - name: photo
        label: Formato da foto
        type: select
        default: square
        options:
          values:
            - square
            - portrait
      - name: tags
        label: Bolhas/tags
        type: string
        list: true
      - name: specs
        label: Especificacoes
        type: object
        fields:
          - name: processor
            label: Processador
            type: string
          - name: memory
            label: Memoria
            type: string
          - name: gpu
            label: Placa de video
            type: string
          - name: powerSupply
            label: Fonte
            type: string
          - name: storage
            label: Armazenamento
            type: string
      - name: links
        label: Links dos anuncios
        type: object
        fields:
          - name: olx
            label: Link da OLX
            type: string
          - name: facebook
            label: Link do Facebook Marketplace
            type: string
      - name: addons
        label: Opcionais especificos deste PC
        type: object
        description: "Use somente quando o opcional for exclusivo deste PC. Os adicionais globais aparecem em todos os PCs automaticamente."
        fields:
          - name: storage
            label: Armazenamento
            type: object
            list: true
            fields:
              - name: active
                label: Ativo
                type: boolean
                default: true
              - name: label
                label: Nome do opcional
                type: string
                required: true
                description: "Exemplo: SSD 240GB instalado"
              - name: price
                label: Preco adicional
                type: number
                required: true
                description: "Digite apenas o numero. Exemplo: 150."
              - name: image
                label: Foto do opcional
                type: image
                description: "Opcional. Aparece como miniatura clicavel no site."
              - name: cutout
                label: Foto recortada/PNG do opcional
                type: image
                description: "Opcional. Se ficar vazio e houver foto, o GitHub tenta criar a versao sem fundo automaticamente."
          - name: peripherals
            label: Mouse e teclado / kits perifericos
            type: object
            list: true
            fields:
              - name: active
                label: Ativo
                type: boolean
                default: true
              - name: label
                label: Nome do opcional
                type: string
                required: true
                description: "Exemplo: Kit mouse + teclado"
              - name: price
                label: Preco adicional
                type: number
                required: true
                description: "Digite apenas o numero. Exemplo: 80."
              - name: image
                label: Foto do opcional
                type: image
                description: "Opcional. Aparece como miniatura clicavel no site."
              - name: cutout
                label: Foto recortada/PNG do opcional
                type: image
                description: "Opcional. Se ficar vazio e houver foto, o GitHub tenta criar a versao sem fundo automaticamente."
      - name: featured
        label: Destaque interno
        type: boolean
        default: false
