name: Generate product cutouts

on:
  push:
    branches:
      - main
    paths:
      - "data/products.json"
      - "assets/**"
      - ".github/scripts/generate_cutouts.py"
      - ".github/workflows/generate-cutouts.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: product-cutouts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-cutouts:
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      U2NET_HOME: /home/runner/.u2net

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check missing cutouts
        id: check
        run: python .github/scripts/generate_cutouts.py --check | tee "$GITHUB_OUTPUT"

      - name: Cache background-removal model
        if: steps.check.outputs.needed == 'true'
        uses: actions/cache@v4
        with:
          path: /home/runner/.u2net
          key: rembg-u2net-${{ runner.os }}

      - name: Install background remover
        if: steps.check.outputs.needed == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install "rembg[cpu]" pillow

      - name: Generate transparent PNGs
        if: steps.check.outputs.needed == 'true'
        run: python .github/scripts/generate_cutouts.py

      - name: Commit generated cutouts
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/products.json
            if [ -d assets/generated ]; then
              git add assets/generated/
            fi
            git commit -m "Generate product cutouts"
            git push
          else
            echo "No cutout changes to commit."
          fi
